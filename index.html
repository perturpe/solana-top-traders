<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Solana Top Traders Dashboard</title>
    <style>
        body {
            background-color: #121212;
            color: #ffffff;
            font-family: Arial, sans-serif;
        }
        .container {
            max-width: 800px;
            margin: auto;
            padding: 20px;
            border: 1px solid #333;
            border-radius: 10px;
        }
        input, button {
            padding: 10px;
            margin: 10px 0;
            border-radius: 5px;
            border: none;
        }
        button {
            background-color: #1e88e5;
            color: white;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }
        th, td {
            border: 1px solid #333;
            padding: 10px;
            text-align: left;
        }
        th {
            background-color: #1e88e5;
        }
        .edit {
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Solana Top Traders Dashboard</h1>
        <label for="apiKey">API Key:</label>
        <input type="text" id="apiKey" placeholder="Enter API Key">
        <label for="tokenMint">Token Mint:</label>
        <input type="text" id="tokenMint" placeholder="Enter Token Mint Address">
        <button id="fetchData">Fetch Data</button>
        <table id="resultsTable">
            <thead>
                <tr>
                    <th>Name</th>
                    <th>Emoji</th>
                    <th>Edit</th>
                </tr>
            </thead>
            <tbody></tbody>
        </table>
        <button id="exportJson">Export to JSON</button>
        <label for="alertsToggle">Enable Alerts:</label>
        <input type="checkbox" id="alertsToggle">
    </div>

    <script>
        const fetchDataBtn = document.getElementById('fetchData');
        const resultsTable = document.getElementById('resultsTable').getElementsByTagName('tbody')[0];
        const exportJsonBtn = document.getElementById('exportJson');

        fetchDataBtn.onclick = async () => {
            const apiKey = document.getElementById('apiKey').value;
            const tokenMint = document.getElementById('tokenMint').value;
            try {
                const response = await fetch(`https://api.birdeye.so/v1/tokens/${tokenMint}`, {
                    headers: {
                        'Authorization': `Bearer ${apiKey}`
                    }
                });
                const data = await response.json();
                displayResults(data);
            } catch (error) {
                console.error('Error fetching data:', error);
            }
        };

        function displayResults(data) {
            resultsTable.innerHTML = '';
            data.traders.forEach(trader => {
                const row = resultsTable.insertRow();
                row.insertCell(0).innerHTML = `<input type='text' value='${trader.name}' class='edit'>`;
                row.insertCell(1).innerHTML = `<input type='text' value='${trader.emoji}' class='edit'>`;
                row.insertCell(2).innerHTML = '<button onclick="editRow(this)">Edit</button>';
            });
        }

        function editRow(button) {
            const row = button.parentNode.parentNode;
            const cells = row.getElementsByTagName('td');
            for (let cell of cells) {
                const input = cell.getElementsByTagName('input')[0];
                if (input) {
                    cell.innerHTML = input.value;
                }
            }
        }

        exportJsonBtn.onclick = () => {
            const json = [];
            for (let row of resultsTable.rows) {
                json.push({
                    name: row.cells[0].innerText,
                    emoji: row.cells[1].innerText
                });
            }
            const blob = new Blob([JSON.stringify(json, null, 2)], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'traders.json';
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
        };
    </script>
</body>
</html>
